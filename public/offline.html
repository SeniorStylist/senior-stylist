<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Senior Stylist</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F4; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; border: 1px solid #E7E5E4; padding: 40px 36px; max-width: 380px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    svg { color: #8B2E4A; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 20px; font-weight: 700; color: #1C1917; }
    p { margin: 0 0 24px; font-size: 14px; color: #78716C; line-height: 1.5; }
    button { background: #8B2E4A; color: #fff; border: none; border-radius: 10px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #72253C; }
  </style>
</head>
<body>
  <div class="card">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
    <h1>You're offline</h1>
    <p>Senior Stylist needs an internet connection to load. Please check your network and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
