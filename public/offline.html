<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Senior Stylist — Offline</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F6F2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      background: #F9EFF2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    h1 {
      color: #1C0A12;
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px;
    }
    p {
      color: #78716C;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    button {
      background: #8B2E4A;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="24" height="24" fill="none" stroke="#8B2E4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M1 6s.7-2 5.4-2S12 6 12 6s1.3-2 5.6-2S23 6 23 6"/>
        <line x1="12" y1="6" x2="12" y2="20"/>
        <path d="M1 6l.7 14h5.6M23 6l-.7 14h-5.6"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Senior Stylist needs a connection to load. Check your WiFi or mobile data and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
